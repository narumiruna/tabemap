<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabelog 附近高評分餐廳</title>
  <link rel="stylesheet" href="/leaflet/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="map-screen" aria-label="地圖主畫面">
    <section class="map-pane" aria-label="互動地圖">
      <div id="map"></div>

      <div id="map-hint" class="map-hint" aria-live="polite">移動地圖或點選位置後即可搜尋</div>
      <button id="search-area-btn" class="search-area-btn" type="button" hidden>在此區域搜尋</button>
      <button id="open-sheet-btn" class="floating-chip" type="button">篩選與設定</button>
      <button id="gps-fab-btn" class="fab" type="button" aria-label="使用目前位置">◎</button>

      <section id="results-section" class="results-section is-hidden" aria-label="搜尋結果">
        <header id="results-header" class="results-header">
          <button id="results-drag-handle" class="results-drag-handle" type="button" aria-label="展開或收合搜尋結果"></button>
          <div class="results-headline">
            <h2 id="results-title">搜尋結果（0 間）</h2>
            <p id="results-subtitle" class="results-subtitle"></p>
          </div>
          <button id="results-close-btn" class="results-close-btn" type="button" aria-label="關閉搜尋結果">×</button>
        </header>
        <div id="restaurant-list" class="restaurant-list"></div>
      </section>

      <button id="results-reopen-btn" class="results-reopen-btn" type="button" hidden>搜尋結果（0）</button>
    </section>

    <aside id="control-panel" class="control-panel" aria-label="篩選與設定">
      <button id="panel-header" class="panel-header" type="button" aria-expanded="false">
        <span class="panel-handle" aria-hidden="true"></span>
        <span id="panel-header-summary" class="panel-header-summary">尚未選擇位置 ・ 1 km ・ 3.5+</span>
      </button>

      <div id="panel-content" class="panel-content">
        <section class="panel-block" aria-label="摘要">
          <h2>摘要</h2>
          <p id="location-summary" class="summary-line">尚未選擇位置</p>
          <p id="filter-summary" class="summary-line">1 km ・ 3.5+</p>
        </section>

        <section class="panel-block" aria-label="位置設定">
          <h2>位置</h2>
          <div class="radio-group">
            <label><input type="radio" name="loc-source" value="map" checked /> 使用地圖選點（預設）</label>
            <label><input type="radio" name="loc-source" value="gps" /> 使用 GPS</label>
          </div>
          <button id="use-gps-btn" class="btn-secondary" type="button">使用目前位置</button>
          <p id="loc-inline-state" class="inline-state" aria-live="polite">點擊地圖選擇位置</p>
        </section>

        <section class="panel-block" aria-label="篩選條件">
          <h2>篩選</h2>
          <label class="field-label" for="radius-select">搜尋半徑</label>
          <select id="radius-select">
            <option value="300">300 m</option>
            <option value="500">500 m</option>
            <option value="1000" selected>1 km</option>
            <option value="3000">3 km</option>
            <option value="5000">5 km</option>
          </select>

          <label class="field-label" for="min-score">最低評分</label>
          <select id="min-score">
            <option value="3.0">3.0+</option>
            <option value="3.3">3.3+</option>
            <option value="3.5" selected>3.5+</option>
            <option value="3.8">3.8+</option>
            <option value="4.0">4.0+</option>
          </select>
        </section>
      </div>
    </aside>
  </main>

  <script src="/leaflet/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
