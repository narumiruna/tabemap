<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabelog 附近高評分餐廳</title>
  <link rel="stylesheet" href="/leaflet/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="map-screen" aria-label="地圖主畫面">
    <div id="map"></div>

    <div id="map-hint" class="map-hint" aria-live="polite">移動地圖或點選位置後即可搜尋</div>

    <button id="search-area-btn" class="search-area-btn" type="button" hidden>在此區域搜尋</button>
    <button id="open-sheet-btn" class="floating-chip" type="button">篩選與設定</button>
    <button id="gps-fab-btn" class="fab" type="button" aria-label="使用目前位置">◎</button>

    <section id="bottom-sheet" class="bottom-sheet" aria-label="篩選設定">
      <button id="sheet-header" class="sheet-header" type="button" aria-expanded="false">
        <span class="sheet-handle" aria-hidden="true"></span>
        <span id="sheet-summary" class="sheet-summary">1 km ・ 3.5+</span>
      </button>

      <div class="sheet-content">
        <section class="sheet-block" aria-label="篩選條件">
          <h2>篩選</h2>
          <label class="field-label" for="radius-select">搜尋半徑</label>
          <select id="radius-select">
            <option value="300">300 m</option>
            <option value="500">500 m</option>
            <option value="1000" selected>1 km</option>
            <option value="3000">3 km</option>
            <option value="5000">5 km</option>
          </select>

          <label class="field-label" for="min-score">最低評分</label>
          <select id="min-score">
            <option value="3.0">3.0+</option>
            <option value="3.3">3.3+</option>
            <option value="3.5" selected>3.5+</option>
            <option value="3.8">3.8+</option>
            <option value="4.0">4.0+</option>
          </select>
        </section>
      </div>
    </section>
  </main>

  <section id="results-section" class="results-section" style="display:none">
    <h2>搜尋結果 <span id="result-count" class="result-count"></span></h2>
    <div id="status-bar" class="status-bar" aria-live="polite"></div>
    <div id="restaurant-list" class="restaurant-list"></div>
  </section>

  <script src="/leaflet/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
